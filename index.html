<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Bank Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    .credit { background: #28a745; color: white; }
    .debit { background: #dc3545; color: white; }
    .secondary { background: #007bff; color: white; }
    .logout { background: gray; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #444;
      padding: 6px;
      text-align: center;
      font-size: 13px;
    }

    th { background: #222; }
  </style>
</head>

<body>

<div class="container" id="authBox">
  <h2>Login / Register</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signUp()">Register</button>
  <button onclick="signIn()">Login</button>
</div>

<div class="container" id="appBox" style="display:none;">
  <h2>Cloud Bank Tracker</h2>

  <select id="bank">
    <option>SBI</option>
    <option>DBS</option>
    <option>APGB</option>
  </select>

  <select id="category">
    <option>Salary</option>
    <option>Business</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Rent</option>
    <option>Utilities</option>
    <option>Medical</option>
    <option>Other</option>
  </select>

  <input type="number" id="amount" placeholder="Amount">
  <input type="date" id="date">
  <input type="text" id="note" placeholder="Note">

  <button class="credit" onclick="addTransaction('Income')">Credit</button>
  <button class="debit" onclick="addTransaction('Expense')">Debit</button>
  <button class="secondary" onclick="showBalances()">View Balances</button>
  <button class="logout" onclick="logout()">Logout</button>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Bank</th>
        <th>Type</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://rzraxtjmlwejzehfisid.supabase.co",
  "sb_publishable_ASeSdhwuRfsTrhREMiR2hA_WRrbM-KM"
);

document.getElementById("date").valueAsDate = new Date();

async function signUp() {
  const email = email.value;
  const password = password.value;
  const { error } = await supabase.auth.signUp({ email, password });
  if (error) alert(error.message);
  else alert("Registered successfully!");
}

async function signIn() {
  const emailVal = email.value;
  const passwordVal = password.value;

  const { error } = await supabase.auth.signInWithPassword({
    email: emailVal,
    password: passwordVal
  });

  if (error) alert(error.message);
  else {
    authBox.style.display = "none";
    appBox.style.display = "block";
    loadTransactions();
  }
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

async function addTransaction(type) {
  const { data: { user } } = await supabase.auth.getUser();

  const bank = document.getElementById("bank").value;
  const category = document.getElementById("category").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  const { error } = await supabase.from("transactions").insert([
    { user_id: user.id, bank, type, category, amount, date, note }
  ]);

  if (!error) {
    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";
    document.getElementById("category").selectedIndex = 0;
    loadTransactions();
  }
}

async function loadTransactions() {
  const { data: { user } } = await supabase.auth.getUser();

  const { data } = await supabase
    .from("transactions")
    .select("*")
    .eq("user_id", user.id)
    .order("date", { ascending: false });

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  data.forEach(t => {
    table.innerHTML += `
      <tr>
        <td>${t.date}</td>
        <td>${t.bank}</td>
        <td>${t.type}</td>
        <td>${t.category}</td>
        <td>₹ ${t.amount}</td>
        <td>
          <button onclick="deleteTransaction('${t.id}')" style="background:red;color:white;border:none;padding:5px;border-radius:4px;">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

async function deleteTransaction(id) {
  const confirmDelete = confirm("Delete this transaction?");
  if (!confirmDelete) return;

  await supabase.from("transactions").delete().eq("id", id);
  loadTransactions();
}

async function showBalances() {
  const { data: { user } } = await supabase.auth.getUser();

  const { data } = await supabase
    .from("transactions")
    .select("*")
    .eq("user_id", user.id);

  let balances = { SBI: 0, DBS: 0, APGB: 0 };

  data.forEach(t => {
    if (t.type === "Income") balances[t.bank] += t.amount;
    else balances[t.bank] -= t.amount;
  });

  alert(
    "SBI: ₹ " + balances.SBI +
    "\nDBS: ₹ " + balances.DBS +
    "\nAPGB: ₹ " + balances.APGB
  );
}

window.signUp = signUp;
window.signIn = signIn;
window.addTransaction = addTransaction;
window.deleteTransaction = deleteTransaction;
window.showBalances = showBalances;
window.logout = logout;
</script>

</body>
</html>
